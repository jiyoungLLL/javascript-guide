<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --c-bg:var(--color-background-primary);
  --c-bg2:var(--color-background-secondary);
  --c-bg3:var(--color-background-tertiary);
  --c-t1:var(--color-text-primary);
  --c-t2:var(--color-text-secondary);
  --c-t3:var(--color-text-tertiary);
  --c-border:var(--color-border-tertiary);
  --c-border2:var(--color-border-secondary);
  --rad:var(--border-radius-md);
  --rad-lg:var(--border-radius-lg);
  --accent:#7F77DD;
}

/* ── Base ─────────────────────────────────── */
html,body{height:100%}

/* ── Shell: topbar + scrollable content ───── */
.wrap{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  min-height:100dvh;
  background:var(--c-bg);
  font-family:var(--font-sans);
  color:var(--c-t1);
  /* stacking context so absolute children (drawer, backdrop) stay inside */
  position:relative;
  overflow:hidden;
}

/* ── Topbar ───────────────────────────────── */
.topbar{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  border-bottom:0.5px solid var(--c-border);
  background:var(--c-bg);
  /* topbar stays on top of drawer backdrop */
  position:relative;
  z-index:10;
  flex-shrink:0;
  min-height:48px;
}
.menu-btn{
  background:none;
  border:0.5px solid var(--c-border2);
  border-radius:var(--rad);
  padding:0;
  cursor:pointer;color:var(--c-t1);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;
  flex-shrink:0;
}
.menu-btn:active{background:var(--c-bg2)}
.topbar-title{
  font-size:14px;font-weight:500;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
}
.prog-chip{
  font-size:11px;color:var(--c-t3);
  background:var(--c-bg2);padding:4px 9px;
  border-radius:20px;white-space:nowrap;flex-shrink:0;
}

/* ── Backdrop — covers the whole .wrap ───── */
.drawer-backdrop{
  display:none;
  position:absolute;inset:0;
  background:rgba(0,0,0,0.25);
  z-index:20;
}
.drawer-backdrop.open{display:block}

/* ── Drawer — slides in from the left ────── */
.drawer{
  position:absolute;
  left:0;top:0;bottom:0;
  width:min(82vw,300px);
  background:var(--c-bg);
  border-right:0.5px solid var(--c-border);
  z-index:30;
  transform:translateX(-100%);
  transition:transform 0.25s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  overflow:hidden;
  box-shadow:12px 0 32px rgba(0,0,0,0.10);
}
.drawer.open{transform:translateX(0)}

.drawer-head{
  padding:14px 16px 10px;
  border-bottom:0.5px solid var(--c-border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.drawer-head-title{font-size:13px;font-weight:600;color:var(--c-t1)}
.drawer-close{
  background:none;border:none;cursor:pointer;
  color:var(--c-t2);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  width:40px;height:40px;border-radius:var(--rad);
}
.drawer-close:active{background:var(--c-bg2)}

.prog-bar-wrap{padding:10px 14px;border-bottom:0.5px solid var(--c-border);flex-shrink:0}
.prog-track{height:3px;background:var(--c-border);border-radius:2px}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.35s ease}

.nav-scroll{flex:1;overflow-y:auto;padding-bottom:16px;-webkit-overflow-scrolling:touch}
.cat-label{
  padding:12px 14px 4px;
  font-size:10px;font-weight:600;
  color:var(--c-t3);letter-spacing:0.07em;text-transform:uppercase;
}
.nav-item{
  display:flex;align-items:center;gap:9px;
  padding:9px 14px;
  font-size:13.5px;color:var(--c-t2);
  cursor:pointer;
  border-left:2.5px solid transparent;
  line-height:1.4;transition:background 0.1s;
  min-height:44px;
}
.nav-item:active{background:var(--c-bg2)}
.nav-item.active{
  background:var(--c-bg2);color:var(--c-t1);
  border-left:2.5px solid var(--accent);font-weight:500;
}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── Main scrollable area ─────────────────── */
.main{
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
  padding:16px 16px 40px;
  min-width:0;
}

/* ── Topic styles ─────────────────────────── */
.topic-tag{
  display:inline-flex;align-items:center;gap:5px;
  font-size:11.5px;padding:4px 11px;border-radius:20px;
  margin-bottom:10px;font-weight:500;
}
.tag-core{background:#EEEDFE;color:#3C3489}
.tag-async{background:#E1F5EE;color:#085041}
.tag-oop{background:#FAECE7;color:#993C1D}
.tag-es6{background:#E6F1FB;color:#0C447C}
.tag-browser{background:#FAEEDA;color:#854F0B}
.tag-perf{background:#EAF3DE;color:#27500A}

.topic-title{font-size:20px;font-weight:600;margin-bottom:10px;line-height:1.3}
.topic-summary{
  font-size:13.5px;color:var(--c-t2);
  background:var(--c-bg2);
  border-left:3px solid var(--accent);
  padding:11px 13px;
  border-radius:0 var(--rad) var(--rad) 0;
  line-height:1.65;
}

.section{margin-top:20px}
.sec-title{
  font-size:11px;font-weight:600;color:var(--c-t3);
  letter-spacing:0.08em;text-transform:uppercase;
  margin-bottom:9px;display:flex;align-items:center;gap:5px;
}
.sec-title i{font-size:13px}
.sec-body{font-size:13.5px;color:var(--c-t1);line-height:1.75}

.iq{
  background:var(--c-bg2);border:0.5px solid var(--c-border);
  border-radius:var(--rad-lg);padding:13px 15px;margin-bottom:10px;
}
.iq .ql{font-size:11px;font-weight:600;color:var(--accent);margin-bottom:6px;letter-spacing:0.04em}
.iq .qt{font-size:13.5px;font-weight:500;color:var(--c-t1);margin-bottom:8px;line-height:1.5}
.iq .ap{font-size:13px;color:var(--c-t2);line-height:1.65}
.ap-row{display:flex;gap:6px;margin-bottom:5px}
.ap-row::before{content:"→";color:var(--accent);flex-shrink:0}

.warn-box{
  background:#FAEEDA;border:0.5px solid #EF9F27;
  border-radius:var(--rad);padding:11px 13px;
  font-size:13.5px;color:#633806;line-height:1.65;margin-top:6px;
}
.react-box{
  background:#E1F5EE;border:0.5px solid #1D9E75;
  border-radius:var(--rad);padding:11px 13px;
  font-size:13.5px;color:#04342C;line-height:1.65;margin-top:6px;
  display:flex;gap:8px;
}
.react-box i{font-size:14px;flex-shrink:0;margin-top:2px}
.expert-box{
  background:#FBEAF0;border:0.5px solid #D4537E;
  border-radius:var(--rad);padding:11px 13px;
  font-size:13.5px;color:#4B1528;line-height:1.65;margin-top:6px;
  display:flex;gap:8px;
}
.expert-box i{font-size:14px;flex-shrink:0;margin-top:2px}

pre{
  background:var(--c-bg3);border:0.5px solid var(--c-border);
  border-radius:var(--rad);padding:13px;
  font-size:12px;font-family:var(--font-mono);
  line-height:1.7;overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  color:var(--c-t1);margin-top:6px;
  -webkit-text-size-adjust:100%;
}
.kw{color:#534AB7;font-weight:500}
.cm{color:var(--c-t3)}
.str{color:#0F6E56}
.fn{color:#993C1D}
.num{color:#854F0B}

.divider{height:0.5px;background:var(--c-border);margin:18px 0}

.nav-controls{
  display:flex;gap:8px;margin-top:22px;
  padding-top:16px;border-top:0.5px solid var(--c-border);
}
.nav-btn{
  flex:1;padding:11px 10px;min-height:44px;
  border:0.5px solid var(--c-border2);border-radius:var(--rad);
  background:var(--c-bg);color:var(--c-t1);
  font-size:13px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  -webkit-user-select:none;user-select:none;
}
.nav-btn:active{background:var(--c-bg2)}
.nav-btn:disabled{opacity:0.3;cursor:default}

.nav-item:focus-visible,.menu-btn:focus-visible,
.drawer-close:focus-visible,.nav-btn:focus-visible{
  outline:2px solid var(--accent);outline-offset:2px;
}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}

/* ── Tablet 640px+ ────────────────────────── */
@media (min-width:640px){
  .topbar{padding:12px 22px}
  .main{padding:22px 26px 40px;max-width:860px;margin:0 auto}
  .drawer{width:300px}
  .topic-title{font-size:22px}
  .topic-summary{font-size:14px;padding:12px 15px}
  .sec-body{font-size:14px}
  pre{font-size:12.5px}
}

/* ── Desktop 1024px+ ──────────────────────── */
@media (min-width:1024px){
  .wrap{
    display:grid;
    grid-template-columns:280px minmax(0,1fr);
    grid-template-rows:auto 1fr;
    grid-template-areas:
      "nav topbar"
      "nav content";
    height:100vh;
    height:100dvh;
    overflow:hidden;
  }
  .topbar{
    grid-area:topbar;
    position:static;
    z-index:auto;
    padding:14px 28px;
  }
  .main{
    grid-area:content;
    padding:28px 36px 48px;
    max-width:980px;
    height:auto;
    overflow-y:auto;
  }
  .menu-btn{display:none}
  .drawer-backdrop{display:none!important}
  .drawer{
    grid-area:nav;
    position:static;
    width:280px;
    transform:none!important;
    box-shadow:none;
    border-right:0.5px solid var(--c-border);
    height:100%;
    overflow:hidden;
  }
  .drawer-close{display:none}
  .drawer-head{padding:18px 18px 12px}
  .drawer-head-title{font-size:14px}
  .nav-scroll{padding-bottom:24px}
  .nav-item{padding:8px 16px;font-size:13px;min-height:auto}
}

/* ── Wide desktop 1280px+ ─────────────────── */
@media (min-width:1280px){
  .wrap{grid-template-columns:300px minmax(0,1fr)}
  .drawer{width:300px}
  .main{max-width:1060px;padding:34px 48px 56px}
  .topic-title{font-size:24px}
}
</style>

<h2 class="sr-only">JavaScript 핵심 개념 면접 대비 가이드 — 26개 주제, 면접 질문 및 코드 예시 포함</h2>

<script>
const topics = [
  {id:'var-let-const',title:'var / let / const',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'변수 선언',
  summary:'var는 함수 스코프 + 호이스팅, let/const는 블록 스코프 + TDZ. 현대 JS에서는 var를 쓸 이유가 없다.',
  explain:`<span class='kw'>var</span>는 <b>함수 스코프(function scope)</b>를 가지며 선언이 함수 최상단으로 호이스팅됩니다. ES6에서 도입된 <span class='kw'>let</span>과 <span class='kw'>const</span>는 <b>블록 스코프(block scope)</b>를 가집니다.<br><br>핵심 차이는 <b>TDZ(Temporal Dead Zone)</b>입니다. <span class='kw'>let</span>/<span class='kw'>const</span>도 호이스팅은 되지만 선언 전 접근 시 ReferenceError를 던져 실수를 빠르게 발견하도록 돕습니다.`,
  whyImportant:'변수 선언 방식은 스코프, 호이스팅, 클로저 모두에 영향을 줍니다. var의 동작을 이해해야 레거시 코드를 읽을 수 있고, let/const를 쓰는 이유를 설명할 수 있습니다.',
  questions:[{q:'var, let, const의 차이를 설명해주세요.',points:['스코프 차이: 함수 스코프 vs 블록 스코프','TDZ 개념으로 호이스팅 동작 차이 설명','const가 불변이 아닌 이유 (참조 고정)','실무에서 var를 피하는 이유']}],
  warn:'const는 "불변"이 아닙니다. const obj = {}; obj.name = "hi"; 는 정상 동작합니다. const가 막는 것은 재할당(obj = {})이지 내부 변경이 아닙니다.',
  react:'React에서 useState setter는 항상 const로 받습니다. const [count, setCount] = useState(0) — setCount는 재할당이 아닌 함수 호출이라 const가 맞습니다.',
  expert:'면접관 포인트: "var를 쓰면 안 되는 구체적인 상황을 코드로 보여줄 수 있나요?" — 반복문 + setTimeout 버그(i가 의도치 않게 공유)를 언급하면 높은 점수.',
  code:`<span class='cm'>// var: 반복문 클로저 버그</span>
<span class='kw'>for</span> (<span class='kw'>var</span> i = <span class='num'>0</span>; i < <span class='num'>3</span>; i++) {
  setTimeout(() => console.log(i), <span class='num'>100</span>); <span class='cm'>// 3,3,3</span>
}
<span class='kw'>for</span> (<span class='kw'>let</span> i = <span class='num'>0</span>; i < <span class='num'>3</span>; i++) {
  setTimeout(() => console.log(i), <span class='num'>100</span>); <span class='cm'>// 0,1,2 ✓</span>
}

<span class='cm'>// TDZ: let/const 선언 전 접근</span>
console.log(a); <span class='cm'>// undefined (var)</span>
console.log(b); <span class='cm'>// ReferenceError (TDZ)</span>
<span class='kw'>var</span> a = <span class='num'>1</span>; <span class='kw'>let</span> b = <span class='num'>2</span>;`},

  {id:'hoisting',title:'호이스팅',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'실행 컨텍스트',
  summary:'JS 엔진이 코드 실행 전 선언을 최상단으로 끌어올리는 동작. 함수 선언식은 전체가, var는 선언만 호이스팅된다.',
  explain:`JS 엔진은 실행 전 <b>생성 단계(Creation Phase)</b>에서 변수와 함수 선언을 스캔합니다.<br><br><b>함수 선언식</b>은 전체가 호이스팅되어 선언 전 호출이 가능합니다. <b>var</b>는 선언만 호이스팅되고 값 할당은 원래 위치에서 됩니다. <b>함수 표현식·화살표 함수</b>는 변수 호이스팅 규칙을 따릅니다.`,
  whyImportant:'호이스팅을 모르면 "왜 선언 전에 함수가 호출되지?" 같은 현상을 이해 못 합니다. 실행 컨텍스트, 스코프, TDZ와 모두 연결됩니다.',
  questions:[{q:'함수 선언식과 표현식의 호이스팅 차이는?',points:['함수 선언식 전체 호이스팅 vs var 선언만','let/const TDZ로 연결','실제 겪을 수 있는 버그 예시']}],
  warn:'function foo() {}은 호이스팅되지만, const foo = function() {}은 TDZ(또는 undefined)입니다.',
  react:'React 컴포넌트를 함수 선언식으로 만들면 파일 내 어디서든 호출 가능합니다. 실무에서는 일관성을 위해 한 가지 방식으로 통일하는 게 좋습니다.',
  expert:'면접관 포인트: "생성 단계(Creation Phase)와 실행 단계(Execution Phase)를 구분해서 호이스팅을 설명해보세요" — 이 구분이 있으면 깊이 있는 지원자로 평가됩니다.',
  code:`<span class='cm'>// 함수 선언식: 전체 호이스팅 ✓</span>
hello(); <span class='cm'>// "안녕!" — 선언 전 호출 가능</span>
<span class='kw'>function</span> <span class='fn'>hello</span>() { console.log(<span class='str'>"안녕!"</span>); }

<span class='cm'>// var: 선언만 호이스팅</span>
console.log(name); <span class='cm'>// undefined</span>
<span class='kw'>var</span> name = <span class='str'>"철수"</span>;

<span class='cm'>// 함수 표현식 + var: TypeError</span>
greet(); <span class='cm'>// TypeError: not a function</span>
<span class='kw'>var</span> greet = <span class='kw'>function</span>() { console.log(<span class='str'>"hi"</span>); }`},

  {id:'scope',title:'스코프',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'스코프 체인',
  summary:'변수에 접근할 수 있는 유효 범위. JS는 정적(렉시컬) 스코프로 코드 작성 위치에 따라 스코프가 결정된다.',
  explain:`JS는 <b>렉시컬 스코프(Lexical Scope)</b>를 사용합니다. 함수가 어디서 <em>호출</em>되었냐가 아니라 어디서 <em>정의</em>되었냐에 따라 스코프가 결정됩니다.<br><br><b>스코프 체인</b>: 변수를 찾을 때 현재 스코프 → 상위 스코프 → 전역 스코프 순으로 탐색합니다. 이 체인이 클로저의 기반입니다.`,
  whyImportant:'모든 변수 접근 오류, 클로저, 모듈 시스템의 근간입니다.',
  questions:[{q:'렉시컬 스코프란 무엇인가요?',points:['정의 위치 기준 vs 호출 위치 기준 구분','스코프 체인 탐색 방향 설명','클로저와의 연결 언급']}],
  warn:'JS는 렉시컬 스코프입니다. this는 호출 방식에 따라 달라지지만(동적), 스코프 체인은 정의 위치 기준입니다.',
  react:'useEffect 내부에서 외부 변수를 참조하면 deps에 반드시 넣어야 합니다. 훅이 렉시컬 스코프를 캡처하기 때문입니다.',
  expert:'면접관 포인트: "스코프 체인과 프로토타입 체인의 차이를 설명해보세요" — 스코프 체인은 변수 탐색, 프로토타입 체인은 프로퍼티·메서드 탐색임을 구분하면 좋습니다.',
  code:`<span class='kw'>const</span> x = <span class='str'>"전역 x"</span>;
<span class='kw'>function</span> <span class='fn'>foo</span>() { console.log(x); }
<span class='kw'>function</span> <span class='fn'>bar</span>() {
  <span class='kw'>const</span> x = <span class='str'>"bar의 x"</span>;
  foo(); <span class='cm'>// "전역 x" — 호출 위치 무관!</span>
}
bar();`},

  {id:'closure',title:'클로저',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'필수 개념',
  summary:'함수가 자신이 선언될 때의 렉시컬 환경을 기억하고, 스코프 밖에서도 그 환경에 접근할 수 있는 것.',
  explain:`클로저는 <b>함수 + 함수가 선언된 렉시컬 환경의 조합</b>입니다. 함수가 생성될 때 자신의 <b>[[Environment]]</b> 슬롯에 현재 렉시컬 환경의 참조를 저장합니다.<br><br>실용적 용도: <b>데이터 은닉(private 변수)</b>, 상태 유지, 함수 팩토리, 커링, 메모이제이션.`,
  whyImportant:'useState, useCallback, debounce 등 현대 JS 패턴의 기반이며 면접 단골 주제입니다.',
  questions:[{q:'클로저를 설명하고 실제 사용 사례를 들어주세요.',points:['단순 정의가 아닌 렉시컬 환경 기억 메커니즘 설명','프라이빗 변수 구현 예시','메모리 누수 가능성 언급 — 이해 깊이 증명','React useState와 연결']}],
  warn:'클로저는 메모리를 계속 점유합니다. 이벤트 리스너나 타이머와 함께 쓸 때 반드시 cleanup을 고려해야 합니다.',
  react:'useEffect deps 배열에 넣지 않으면 오래된 값을 참조하는 "stale closure" 버그가 생깁니다.',
  expert:'면접관 포인트: "stale closure 문제를 경험해봤나요?" 또는 "클로저로 메모리 누수가 생기는 상황을 만들어보세요"로 이어집니다.',
  code:`<span class='kw'>function</span> <span class='fn'>createCounter</span>() {
  <span class='kw'>let</span> count = <span class='num'>0</span>; <span class='cm'>// 외부에서 접근 불가</span>
  <span class='kw'>return</span> {
    increment: () => ++count,
    get: () => count
  };
}
<span class='kw'>const</span> c = createCounter();
c.increment(); c.increment();
console.log(c.get());   <span class='cm'>// 2</span>
console.log(c.count);   <span class='cm'>// undefined (은닉됨)</span>`},

  {id:'execution-context',title:'실행 컨텍스트',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'엔진 내부',
  summary:'JS 코드 실행에 필요한 환경 정보를 담은 객체. 생성 단계와 실행 단계로 나뉘며 Call Stack에 쌓인다.',
  explain:`실행 컨텍스트는 JS 엔진이 코드 실행 시 생성하는 추상 개념입니다.<br><br><b>생성 단계</b>: 변수·함수 선언 등록(호이스팅), this 결정<br><b>실행 단계</b>: 코드 한 줄씩 실행, 값 할당<br><br>컨텍스트는 생성 시 Call Stack에 push, 완료 시 pop됩니다.`,
  whyImportant:'호이스팅, 스코프, 클로저, this 바인딩 모두 실행 컨텍스트를 통해 설명됩니다.',
  questions:[{q:'실행 컨텍스트란 무엇이고 어떻게 동작하나요?',points:['생성 단계 vs 실행 단계 구분','Call Stack과의 관계','호이스팅이 생성 단계의 결과임을 연결']}],
  warn:'Variable Environment와 Lexical Environment를 구분하지 않아도 되지만, "생성 단계에서 선언이 등록된다"는 개념은 꼭 이해해야 합니다.',
  react:'React 함수 컴포넌트는 렌더링될 때마다 새 실행 컨텍스트가 생성됩니다. 훅의 클로저가 각 렌더마다 다른 값을 캡처할 수 있는 이유입니다.',
  expert:'면접관 포인트: 단순히 "코드 실행 환경"이라고만 답하면 부족합니다. 생성/실행 단계를 구분하고 호이스팅과 연결하면 이해도가 깊은 지원자로 평가됩니다.',
  code:`<span class='cm'>// Call Stack 변화 흐름</span>
<span class='kw'>function</span> <span class='fn'>a</span>() { <span class='fn'>b</span>(); }
<span class='kw'>function</span> <span class='fn'>b</span>() { console.log(<span class='str'>"b"</span>); }
<span class='fn'>a</span>();
<span class='cm'>// 스택: [전역] → [전역,a] → [전역,a,b]
//      → [전역,a] → [전역] → []</span>`},

  {id:'event-loop',title:'이벤트 루프',cat:'async',catLabel:'비동기',tag:'tag-async',tagText:'비동기 핵심',
  summary:'Call Stack이 비었을 때 큐에서 콜백을 꺼내 실행하는 메커니즘. JS가 싱글 스레드임에도 비동기를 처리하는 원리.',
  explain:`JS는 <b>싱글 스레드</b>지만 이벤트 루프 덕분에 비동기 처리가 가능합니다.<br><br><b>Microtask Queue</b>: Promise.then, queueMicrotask<br><b>Macrotask Queue</b>: setTimeout, setInterval, I/O<br><br>우선순위: <b>Call Stack → Microtask 전체 → Macrotask 하나</b>`,
  whyImportant:'Promise가 setTimeout보다 먼저 실행되는 이유, setTimeout(fn,0)의 실제 동작 등을 설명할 수 있어야 합니다.',
  questions:[{q:'Microtask와 Macrotask의 차이와 실행 순서를 설명해주세요.',points:['Call Stack 비어야 큐에서 가져옴','Microtask 전체 → Macrotask 하나 순서','실행 순서를 맞추는 코드 문제 대비']}],
  warn:'setTimeout(fn, 0)은 0ms 후 실행이 아닙니다. "Call Stack이 비고 Macrotask 순서가 되었을 때" 실행됩니다. Promise.then이 먼저입니다.',
  react:'React 18의 useTransition은 급하지 않은 상태 업데이트를 후순위로 처리해 UI가 막히지 않도록 합니다.',
  expert:'면접관 포인트: 실행 순서를 맞추는 코드 문제가 자주 나옵니다. console.log 4~5개가 섞인 코드를 보여주고 순서를 물어봅니다.',
  code:`console.log(<span class='str'>"1"</span>);
setTimeout(() => console.log(<span class='str'>"2"</span>), <span class='num'>0</span>); <span class='cm'>// Macro</span>
Promise.resolve().then(() => console.log(<span class='str'>"3"</span>)); <span class='cm'>// Micro</span>
Promise.resolve()
  .then(() => console.log(<span class='str'>"4"</span>))
  .then(() => console.log(<span class='str'>"5"</span>));
console.log(<span class='str'>"6"</span>);
<span class='cm'>// 출력: 1, 6, 3, 4, 5, 2</span>`},

  {id:'promise-async',title:'Promise / async-await',cat:'async',catLabel:'비동기',tag:'tag-async',tagText:'필수 패턴',
  summary:'Promise는 비동기 연산의 최종 결과 객체. async/await는 Promise를 동기처럼 쓸 수 있게 하는 문법적 설탕.',
  explain:`<b>Promise</b> 3가지 상태: <b>Pending → Fulfilled / Rejected</b><br><br><b>async/await</b>는 Promise 기반으로 동기 코드처럼 읽히게 만든 문법입니다.<br><br><b>Promise 유틸리티</b>:<br>• Promise.all — 모두 성공해야 resolve<br>• Promise.allSettled — 성공/실패 무관 모든 결과<br>• Promise.race — 가장 먼저 settled된 결과`,
  whyImportant:'현대 JS에서 API 호출, 파일 읽기 등 모든 비동기 작업의 표준입니다.',
  questions:[{q:'Promise.all과 Promise.allSettled의 차이는?',points:['실패 시 동작 차이 명확히 설명','실무에서 언제 각각 쓰는지 예시','병렬 vs 순차 실행 차이']}],
  warn:'await를 반복문 안에서 쓰면 순차 실행됩니다. 병렬 처리가 필요하면 Promise.all + map을 조합하세요.',
  react:'Next.js 서버 컴포넌트는 async 컴포넌트를 지원합니다. async function Page() { const data = await fetch(...) }',
  expert:'면접관 포인트: "async 함수의 반환값은 무엇인가요?" — 항상 Promise를 반환합니다. await 없이 호출하면 Promise가 반환됩니다.',
  code:`<span class='cm'>// 병렬 처리 비교</span>
<span class='kw'>async function</span> <span class='fn'>seq</span>() {
  <span class='kw'>const</span> u1 = <span class='kw'>await</span> fetchUser(<span class='num'>1</span>); <span class='cm'>// 1초</span>
  <span class='kw'>const</span> u2 = <span class='kw'>await</span> fetchUser(<span class='num'>2</span>); <span class='cm'>// 1초 → 총 2초 ❌</span>
}
<span class='kw'>async function</span> <span class='fn'>par</span>() {
  <span class='kw'>const</span> [u1,u2] = <span class='kw'>await</span> Promise.all(
    [fetchUser(<span class='num'>1</span>), fetchUser(<span class='num'>2</span>)]
  ); <span class='cm'>// 총 1초 ✓</span>
}`},

  {id:'this-binding',title:'this 바인딩',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'동적 바인딩',
  summary:'this는 함수 호출 방식에 따라 동적으로 결정된다. 화살표 함수만 예외로 정의 시점의 this를 캡처한다.',
  explain:`<b>4가지 바인딩 규칙</b>:<br>1. 기본 — 단독 호출 시 전역(strict: undefined)<br>2. 암시적 — 메서드 호출 시 점(.) 앞 객체<br>3. 명시적 — call/apply/bind로 직접 지정<br>4. new — 새로 생성된 객체<br><br>우선순위: <b>new > 명시적 > 암시적 > 기본</b>`,
  whyImportant:'이벤트 핸들러, 클래스 메서드, 콜백에서 this가 의도치 않게 달라지는 버그가 자주 발생합니다.',
  questions:[{q:'다음 코드에서 각 this는 무엇인가요? (코드 제시형)',points:['4가지 바인딩 규칙 설명','화살표 함수는 this 없음','암시적 바인딩 손실 패턴','call/apply/bind 차이']}],
  warn:'"메서드를 변수에 담으면 this를 잃습니다" — const fn = obj.method; fn(); 에서 this는 더 이상 obj가 아닙니다.',
  react:'함수형 컴포넌트 + 훅으로 넘어온 이유 중 하나가 this 바인딩 문제입니다. 클래스 컴포넌트에서는 constructor에서 직접 bind해야 했습니다.',
  expert:'면접관 포인트: call vs apply vs bind — call/apply는 즉시 실행, bind는 새 함수 반환. call은 인수 개별, apply는 배열.',
  code:`<span class='kw'>const</span> obj = {
  name: <span class='str'>"obj"</span>,
  <span class='fn'>regular</span>: <span class='kw'>function</span>() { console.log(<span class='kw'>this</span>.name); },
  <span class='fn'>arrow</span>: () => { console.log(<span class='kw'>this</span>.name); }
};
obj.regular(); <span class='cm'>// "obj" — 암시적 바인딩</span>
obj.arrow();   <span class='cm'>// undefined — 외부 this</span>

<span class='kw'>const</span> fn = obj.regular;
fn(); <span class='cm'>// undefined — 바인딩 손실!</span>`},

  {id:'arrow-vs-regular',title:'화살표 함수 vs 일반 함수',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'비교',
  summary:'화살표 함수는 자체 this, arguments, prototype이 없다. 생성자로 쓸 수 없고 this는 정의 시점 외부 스코프에서 상속.',
  explain:`화살표 함수 특징:<br>• <b>this 없음</b>: 외부 스코프의 this를 렉시컬로 캡처<br>• <b>arguments 없음</b>: rest 파라미터(...args)로 대체<br>• <b>prototype 없음</b>: new로 생성자 호출 불가<br><br>일반 함수는 호출 방식에 따라 this가 동적으로 결정됩니다.`,
  whyImportant:'메서드 정의, 콜백, 이벤트 핸들러에서 적절한 선택이 달라집니다.',
  questions:[{q:'화살표 함수를 언제 쓰고, 언제 일반 함수를 써야 하나요?',points:['this 바인딩 차이로 설명','객체 메서드는 일반 함수','콜백은 보통 화살표 함수','arguments vs rest 차이']}],
  warn:'객체 리터럴의 메서드를 화살표 함수로 정의하면 this가 의도와 다릅니다. const obj = { greet: () => this.name } — this는 obj가 아닌 외부 스코프입니다.',
  react:'React 이벤트 핸들러에 화살표 함수를 인라인으로 쓰면 매 렌더마다 새 함수가 생성됩니다. 성능이 중요한 경우 useCallback으로 감싸세요.',
  expert:'면접관 포인트: "React 클래스 컴포넌트에서 핸들러를 화살표 함수로 정의하는 이유?" — this 바인딩 고정. constructor bind 대신 클래스 필드 화살표 함수 사용.',
  code:`<span class='kw'>class</span> <span class='fn'>Timer</span> {
  <span class='kw'>constructor</span>() { <span class='kw'>this</span>.sec = <span class='num'>0</span>; }
  <span class='cm'>// ❌ 일반 함수: this가 window</span>
  startBad() {
    setInterval(<span class='kw'>function</span>() { <span class='kw'>this</span>.sec++; }, <span class='num'>1000</span>);
  }
  <span class='cm'>// ✅ 화살표: 외부 this 유지</span>
  startGood() {
    setInterval(() => { <span class='kw'>this</span>.sec++; }, <span class='num'>1000</span>);
  }
}`},

  {id:'prototype',title:'프로토타입 & 체인',cat:'oop',catLabel:'객체 지향',tag:'tag-oop',tagText:'OOP',
  summary:'JS의 상속은 클래스 기반이 아닌 프로토타입 체인으로 구현된다. 모든 객체는 [[Prototype]] 링크를 가진다.',
  explain:`JS는 <b>프로토타입 기반(Prototype-based)</b> 언어입니다. ES6 class는 이 프로토타입의 문법적 설탕입니다.<br><br>프로퍼티·메서드를 찾을 때: <b>현재 객체 → [[Prototype]] → ... → Object.prototype → null</b> 순으로 탐색합니다.`,
  whyImportant:'class를 사용해도 내부는 프로토타입입니다. 상속, 메서드 공유, instanceof 동작 등을 이해하는 기반입니다.',
  questions:[{q:'JS의 상속이 다른 OOP 언어와 어떻게 다른가요?',points:['클래스 기반 vs 프로토타입 기반 차이','ES6 class는 syntax sugar임을 언급','__proto__ vs prototype 구분']}],
  warn:'__proto__와 prototype은 다릅니다. __proto__는 인스턴스의 [[Prototype]] 접근자, prototype은 생성자 함수의 프로퍼티입니다.',
  react:'React.Component extends는 프로토타입 체인으로 setState 등을 상속합니다. 함수형 컴포넌트는 이 상속 체계를 사용하지 않습니다.',
  expert:'면접관 포인트: "class 문법이 편한데 프로토타입을 왜 알아야 하나요?" — 디버깅, 성능 최적화, 폴리필 이해, 오픈소스 코드 읽기를 위해 필요.',
  code:`<span class='kw'>const</span> dog = <span class='kw'>new</span> Animal(<span class='str'>"강아지"</span>);
console.log(dog.__proto__ === Animal.prototype); <span class='cm'>// true</span>
console.log(dog.__proto__.__proto__ === Object.prototype); <span class='cm'>// true</span>
console.log(dog.__proto__.__proto__.__proto__); <span class='cm'>// null</span>`},

  {id:'shallow-deep-copy',title:'얕은 복사 vs 깊은 복사',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'참조 타입',
  summary:'얕은 복사는 1레벨만 복사, 깊은 복사는 중첩 구조 전체를 복사. React 불변성의 핵심 개념.',
  explain:`<b>얕은 복사</b>: 최상위만 새 메모리, 중첩 객체는 같은 참조 공유<br>방법: Object.assign(), spread({...obj})<br><br><b>깊은 복사</b>: 모든 중첩 구조를 재귀적으로 복사<br>방법: structuredClone() (권장), JSON.parse(JSON.stringify()), lodash.cloneDeep()`,
  whyImportant:'React 상태 관리에서 불변성 유지에 핵심입니다. 얕은 복사로 상태를 수정하면 React가 변경을 감지하지 못합니다.',
  questions:[{q:'얕은 복사와 깊은 복사의 차이를 실제 예시로 설명해주세요.',points:['참조 타입의 메모리 구조로 설명','JSON 방식의 한계 (함수, undefined, Date 손실)','structuredClone() 최신 지식 어필','React 불변성과의 연결']}],
  warn:'JSON.parse(JSON.stringify(obj))는 함수, undefined, Symbol, Date(문자열 변환), 순환 참조를 처리 못합니다.',
  react:'setState(prev => ({...prev, name: "새이름"})) — 얕은 복사 + 변경. 중첩 상태면 immer.js 사용을 고려합니다.',
  expert:'면접관 포인트: "React에서 직접 state를 수정하면 왜 안 되나요?" — Object.is()로 참조 동일성 체크를 하기 때문에, 같은 참조면 리렌더링이 안 됩니다.',
  code:`<span class='kw'>const</span> orig = { name:<span class='str'>"홍"</span>, addr:{ city:<span class='str'>"서울"</span> } };
<span class='kw'>const</span> shallow = { ...orig };
shallow.addr.city = <span class='str'>"부산"</span>; <span class='cm'>// orig도 "부산" ❌</span>

<span class='kw'>const</span> deep = structuredClone(orig);
deep.addr.city = <span class='str'>"인천"</span>; <span class='cm'>// orig 영향 없음 ✓</span>`},

  {id:'destructuring',title:'구조 분해 할당',cat:'es6',catLabel:'ES6+',tag:'tag-es6',tagText:'ES6 문법',
  summary:'배열/객체의 값을 변수로 추출하는 간결한 문법. 기본값, 별칭, 중첩 구조 분해가 가능하다.',
  explain:`<b>배열 구조 분해</b>: 위치 기반으로 추출. useState 훅이 대표적 활용입니다.<br><b>객체 구조 분해</b>: 이름 기반. 별칭(alias), 기본값, 중첩 구조 분해가 모두 가능합니다.<br><br>함수 파라미터에서도 사용 가능해 React props 처리에 매우 유용합니다.`,
  whyImportant:'React 컴포넌트의 props 분해, useState 반환값, API 응답 처리 등 현대 JS 코드의 기본기입니다.',
  questions:[{q:'구조 분해 할당의 활용 예시를 들어주세요.',points:['배열 vs 객체 차이 (위치 vs 이름 기반)','기본값과 별칭 설명','함수 파라미터 구조 분해','React 컴포넌트와 연결']}],
  warn:'객체 구조 분해에서 변수명 변경: const { name: userName } = user — name을 userName 변수로 받는 것입니다.',
  react:'const [state, setState] = useState(0), const { data, isLoading } = useQuery(...)',
  expert:'면접관 포인트: "구조 분해 할당의 기본값은 언제 적용되나요?" — undefined일 때만. null은 기본값이 적용되지 않습니다.',
  code:`<span class='kw'>const</span> [a, b, ...rest] = [<span class='num'>1</span>,<span class='num'>2</span>,<span class='num'>3</span>,<span class='num'>4</span>];
<span class='kw'>const</span> { name: userName, role = <span class='str'>"user"</span> } = user;

<span class='cm'>// 기본값은 undefined일 때만!</span>
<span class='kw'>const</span> { x = <span class='num'>10</span> } = { x: <span class='kw'>null</span> };
console.log(x); <span class='cm'>// null (기본값 안 적용)</span>`},

  {id:'spread-rest',title:'Spread / Rest 문법',cat:'es6',catLabel:'ES6+',tag:'tag-es6',tagText:'ES6 문법',
  summary:'Spread(...)는 펼치기, Rest(...)는 모으기. 같은 ... 기호지만 위치에 따라 반대로 동작한다.',
  explain:`<b>Spread</b>: 배열/객체/이터러블을 펼칩니다. 복사, 병합, 함수 인수 전달에 사용.<br><b>Rest</b>: 함수의 나머지 인수들을 배열로 모읍니다. 반드시 마지막 파라미터여야 합니다.<br><br>구분법: 함수 파라미터 자리 = Rest, 나머지 = Spread`,
  whyImportant:'불변성 유지를 위한 객체/배열 복사, 가변 인수 함수 구현 등 현대 JS의 기본기입니다.',
  questions:[{q:'Spread와 Rest의 차이를 설명하고 각각의 사용 예시를 들어주세요.',points:['같은 문법, 다른 동작 설명','Spread: 펼치기 (복사, 병합)','Rest: 모으기 (나머지 수집)','arguments 객체와의 차이']}],
  warn:'Spread로 객체를 복사하면 얕은 복사입니다. {...obj}는 1레벨만 복사됩니다.',
  react:'<Component {...props} />는 부모의 모든 prop을 내려줍니다. 불필요한 props가 전달될 수 있어 주의가 필요합니다.',
  expert:'면접관 포인트: "Rest 파라미터와 arguments 객체의 차이는?" — arguments는 유사 배열(배열 메서드 없음), rest는 진짜 배열. 화살표 함수엔 arguments 없음.',
  code:`<span class='kw'>const</span> merged = [...arr1, ...arr2];
<span class='kw'>const</span> updated = { ...obj, b:<span class='num'>99</span>, c:<span class='num'>3</span> };

<span class='kw'>function</span> <span class='fn'>sum</span>(first, ...rest) {
  <span class='kw'>return</span> rest.reduce((a,n) => a+n, first);
}
sum(<span class='num'>1</span>,<span class='num'>2</span>,<span class='num'>3</span>,<span class='num'>4</span>); <span class='cm'>// 10</span>`},

  {id:'array-methods',title:'배열 메서드',cat:'es6',catLabel:'ES6+',tag:'tag-es6',tagText:'함수형 패턴',
  summary:'map은 변환, filter는 걸러내기, reduce는 축약. 모두 원본 배열을 변경하지 않는 불변 메서드.',
  explain:`<b>map</b>: 각 요소를 변환한 새 배열 반환<br><b>filter</b>: 조건 만족 요소만 담은 새 배열<br><b>reduce</b>: 배열을 하나의 값으로 축약 (가장 강력)<br><b>find</b>: 조건 첫 번째 요소 (없으면 undefined)<br><b>some/every</b>: 하나라도/모두 조건 만족 여부 boolean<br><b>flat/flatMap</b>: 중첩 배열 평탄화`,
  whyImportant:'React에서 목록 렌더링(map), 데이터 필터링(filter), 통계 계산(reduce)은 매일 쓰는 패턴입니다.',
  questions:[{q:'forEach와 map의 차이는? reduce로 map을 구현해보세요.',points:['forEach는 반환값 없음, map은 새 배열 반환','reduce로 모든 배열 메서드 구현 가능','성능 고려 (필요 이상의 체이닝)']}],
  warn:'map에서 return을 빠뜨리면 undefined 배열이 반환됩니다. 화살표 함수에서 객체 리터럴 반환 시 ({})처럼 소괄호로 감싸야 합니다.',
  react:'{items.map(item => <Item key={item.id} />)} — key prop 없으면 경고. key는 재조정(reconciliation)에 사용됩니다.',
  expert:'면접관 포인트: "reduce의 초기값이 없으면?" — 첫 요소가 acc, 두 번째부터 순회. 빈 배열에 초기값 없으면 TypeError.',
  code:`<span class='kw'>const</span> result = users
  .filter(u => u.active && u.age >= <span class='num'>18</span>)
  .map(u => u.name);

<span class='kw'>const</span> total = users.reduce((acc,u) => acc+u.age, <span class='num'>0</span>);

<span class='cm'>// reduce로 id→객체 맵 변환</span>
<span class='kw'>const</span> map = users.reduce((acc,u) => {
  acc[u.id] = u; <span class='kw'>return</span> acc;
}, {});`},

  {id:'debounce-throttle',title:'debounce / throttle',cat:'perf',catLabel:'성능',tag:'tag-perf',tagText:'성능 최적화',
  summary:'debounce는 마지막 호출 후 일정 시간 경과 시 실행, throttle은 일정 시간 내 최대 1회 실행. 클로저 기반 패턴.',
  explain:`<b>Debounce</b>: 연속 이벤트에서 마지막 이벤트 후 N ms가 지나야 실행. 중간 호출은 모두 취소. 검색 자동완성에 적합.<br><br><b>Throttle</b>: N ms마다 최대 1회 실행 보장. 스크롤, 마우스 이동에 적합.<br><br>둘 다 클로저를 활용해 타이머 상태를 유지합니다.`,
  whyImportant:'검색창 API 호출, 스크롤 이벤트, 리사이즈 처리 등 성능 최적화의 기본 기법이자 클로저 실전 활용 예시입니다.',
  questions:[{q:'debounce와 throttle을 직접 구현해보세요.',points:['setTimeout/clearTimeout 이용한 debounce','flag 변수 이용한 throttle','각각 적합한 사용 사례 구분','lodash 없이 직접 구현 가능 여부']}],
  warn:'debounce로 검색창 구현 시 컴포넌트가 unmount되면 타이머가 살아있을 수 있습니다. cleanup이 필요합니다.',
  react:'React 18의 useDeferredValue는 debounce와 유사하지만 타이머 기반이 아닌 React 스케줄러 기반으로 더 정교합니다.',
  expert:'면접관 포인트: "debounce가 클로저를 어떻게 활용하는지?" — timerId를 클로저로 유지하기 때문에 clearTimeout으로 이전 호출을 취소할 수 있습니다.',
  code:`<span class='kw'>function</span> <span class='fn'>debounce</span>(fn, delay) {
  <span class='kw'>let</span> timerId;
  <span class='kw'>return function</span>(...args) {
    clearTimeout(timerId);
    timerId = setTimeout(() => fn.apply(<span class='kw'>this</span>,args), delay);
  };
}
<span class='kw'>function</span> <span class='fn'>throttle</span>(fn, delay) {
  <span class='kw'>let</span> last = <span class='num'>0</span>;
  <span class='kw'>return function</span>(...args) {
    <span class='kw'>if</span> (Date.now() - last >= delay) {
      last = Date.now(); fn.apply(<span class='kw'>this</span>,args);
    }
  };
}`},

  {id:'equality',title:'동등 비교 (== vs ===)',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'타입 비교',
  summary:'== 은 타입 변환 후 비교, === 은 타입까지 동일해야 함. 실무에서는 항상 === 를 사용하라.',
  explain:`<b>== (추상적 동등)</b>: 타입 변환(Type Coercion) 후 비교. 규칙이 복잡하고 직관적이지 않아 버그 원인.<br><br><b>=== (엄격한 동등)</b>: 타입 변환 없이 값과 타입 모두 비교. 예측 가능하고 안전.<br><br><b>Object.is()</b>: ===와 유사하지만 NaN === NaN이 true, +0 === -0이 false. React 상태 변경 감지에 사용됩니다.`,
  whyImportant:'==의 암묵적 변환 규칙은 예상치 못한 버그를 만듭니다.',
  questions:[{q:'"0 == false"가 true인 이유를 설명해보세요.',points:['타입 변환 규칙: boolean → number 변환','Object.is() vs === 차이','null == undefined는 true지만 !== false']}],
  warn:'null == undefined는 true이지만, null === undefined는 false입니다.',
  react:'useEffect deps 비교와 useMemo/useCallback 최적화는 Object.is()를 사용합니다. NaN이 deps에 들어가면 매 렌더마다 실행될 수 있습니다.',
  expert:'면접관 포인트: "NaN === NaN이 왜 false인가요?" — IEEE 754 규약. 어떤 NaN도 다른 NaN과 같지 않다는 정의입니다.',
  code:`console.log(<span class='num'>0</span> == <span class='kw'>false</span>);          <span class='cm'>// true</span>
console.log(<span class='str'>""</span> == <span class='kw'>false</span>);         <span class='cm'>// true</span>
console.log(<span class='kw'>null</span> == <span class='kw'>undefined</span>); <span class='cm'>// true</span>
console.log([<span class='num'>1</span>] == <span class='num'>1</span>);          <span class='cm'>// true!</span>

console.log(<span class='kw'>NaN</span> === <span class='kw'>NaN</span>);          <span class='cm'>// false</span>
console.log(Object.is(<span class='kw'>NaN</span>,<span class='kw'>NaN</span>));   <span class='cm'>// true</span>`},

  {id:'null-undefined-nan',title:'null / undefined / NaN',cat:'core',catLabel:'핵심 JS',tag:'tag-core',tagText:'타입 이해',
  summary:'null은 의도적 없음, undefined는 초기화 안 됨, NaN은 숫자 연산 실패. 셋 모두 falsy지만 다르게 다뤄야 한다.',
  explain:`<b>undefined</b>: 변수 선언됐지만 값 미할당. JS 엔진이 자동 할당.<br><b>null</b>: 개발자가 명시적으로 "값 없음" 표현. 의도적 빈 값.<br><b>NaN</b>: 숫자 연산 실패. typeof NaN === "number" (역설!)<br><br>typeof null === "object"는 역사적 버그입니다.`,
  whyImportant:'이 세 값을 혼용하면 "Cannot read properties of null" 같은 런타임 에러가 발생합니다.',
  questions:[{q:'typeof null === "object"인 이유는?',points:['초기 JS 구현의 메모리 태그 방식 설명','null은 객체가 아님을 명확히','Number.isNaN() vs isNaN() 차이']}],
  warn:'NaN 감지는 Number.isNaN()을 쓰세요. isNaN("abc")는 타입 변환 후 true가 되는 오동작이 있습니다.',
  react:'React 렌더링: null과 undefined는 렌더링 안 됨. 0은 렌더링됨 주의! {count && <Component />}에서 count가 0이면 "0"이 출력됩니다.',
  expert:'면접관 포인트: "JSX에서 {0 && <Component />}를 쓰면 왜 0이 출력되나요?" — &&는 첫 falsy 값을 반환. {count > 0 && <Component />}로 수정해야 합니다.',
  code:`console.log(<span class='kw'>typeof</span> <span class='kw'>undefined</span>); <span class='cm'>// "undefined"</span>
console.log(<span class='kw'>typeof</span> <span class='kw'>null</span>);      <span class='cm'>// "object" 버그!</span>
console.log(<span class='kw'>typeof</span> <span class='kw'>NaN</span>);       <span class='cm'>// "number" 역설</span>

console.log(isNaN(<span class='str'>"abc"</span>));        <span class='cm'>// true (타입 변환!)</span>
console.log(Number.isNaN(<span class='str'>"abc"</span>)); <span class='cm'>// false ✓</span>
console.log(Number.isNaN(<span class='kw'>NaN</span>));   <span class='cm'>// true ✓</span>`},

  {id:'optional-chaining',title:'옵셔널 체이닝 & ??',cat:'es6',catLabel:'ES6+',tag:'tag-es6',tagText:'ES2020',
  summary:'?. 는 null/undefined 체크 후 접근, ?? 는 null/undefined일 때만 기본값. || 와 ?? 의 차이가 핵심.',
  explain:`<b>옵셔널 체이닝(?.)</b>: null/undefined 시 에러 대신 undefined 반환. 깊은 중첩 객체 접근에 유용.<br><br><b>Nullish Coalescing(??)</b>: 좌항이 null 또는 undefined일 때만 우항 반환.<br><br><b>|| vs ??</b>: ||은 falsy(0, "", false)일 때 우항. ??은 nullish(null, undefined)만.`,
  whyImportant:'API 응답의 중첩 데이터 접근, 기본값 처리에서 매일 쓰는 문법입니다.',
  questions:[{q:'|| 와 ?? 의 차이를 실제 버그 상황으로 설명해주세요.',points:['falsy vs nullish 차이 정확히 설명','0이나 빈 문자열이 의미 있는 경우의 버그','?.과 ??를 조합하는 패턴']}],
  warn:'사용자가 나이를 0으로 설정했는데 const age = user.age || 18이 항상 18을 반환합니다. ??를 써야 합니다.',
  react:'user?.profile?.avatar ?? defaultAvatar — user나 profile이 로딩 중이어도 에러 없이 기본값을 보여줍니다.',
  expert:'면접관 포인트: "?? 와 ||의 차이를 0과 빈 문자열이 포함된 예시로 설명해주세요"',
  code:`<span class='kw'>const</span> user = { score: <span class='num'>0</span> };
console.log(user.score || <span class='num'>10</span>);  <span class='cm'>// 10 ❌</span>
console.log(user.score ?? <span class='num'>10</span>);  <span class='cm'>// 0  ✓</span>

<span class='cm'>// 옵셔널 체이닝 + nullish</span>
<span class='kw'>const</span> name = res?.data?.user?.name ?? <span class='str'>"익명"</span>;
callback?.(); <span class='cm'>// callback이 있을 때만 호출</span>`},

  {id:'memory-leak',title:'메모리 누수 & GC',cat:'perf',catLabel:'성능',tag:'tag-perf',tagText:'메모리 관리',
  summary:'GC는 도달 불가능한 객체를 수거. 이벤트 리스너, 타이머, 전역 변수, 클로저가 메모리 누수의 주범.',
  explain:`<b>가비지 컬렉션(GC)</b>: 더 이상 참조되지 않는 객체의 메모리를 자동 해제. Mark-and-Sweep 알고리즘 사용.<br><br>메모리 누수 주요 원인:<br>1. 제거하지 않은 이벤트 리스너<br>2. clearTimeout/clearInterval 누락<br>3. 전역 변수 오용<br>4. 클로저가 대형 객체를 참조<br>5. WeakMap/WeakSet을 써야 할 곳에 Map/Set 사용`,
  whyImportant:'SPA에서 메모리 누수는 시간이 지날수록 앱이 느려지는 원인이 됩니다.',
  questions:[{q:'React에서 메모리 누수가 발생하는 상황과 해결 방법은?',points:['useEffect cleanup 함수의 역할','AbortController로 fetch 취소','unmount 후 setState 호출 문제','WeakRef/WeakMap 활용']}],
  warn:'"Can\'t perform a React state update on an unmounted component" — 이 경고가 메모리 누수 경고입니다. cleanup으로 해결해야 합니다.',
  react:'useEffect의 return 함수가 cleanup입니다. 이벤트 리스너, 타이머, 구독은 반드시 cleanup에서 정리해야 합니다.',
  expert:'면접관 포인트: "WeakMap과 Map의 차이는?" — WeakMap의 키는 약한 참조라 GC 대상이 됩니다. 키 객체가 사라지면 자동으로 정리됩니다.',
  code:`useEffect(() => {
  <span class='kw'>const</span> ctrl = <span class='kw'>new</span> AbortController();
  fetch(<span class='str'>"/api"</span>, { signal: ctrl.signal })
    .then(r => r.json()).then(setData)
    .catch(e => { <span class='kw'>if</span>(e.name!==<span class='str'>"AbortError"</span>) <span class='kw'>throw</span> e });
  <span class='kw'>return</span> () => ctrl.abort();
}, []);`},

  {id:'dom-virtual-dom',title:'DOM vs Virtual DOM',cat:'browser',catLabel:'브라우저',tag:'tag-browser',tagText:'React 핵심',
  summary:'DOM은 실제 HTML 트리, Virtual DOM은 메모리상의 경량 JS 객체. React가 VDOM으로 최소한의 실제 DOM 수정을 계산한다.',
  explain:`<b>DOM</b>: HTML 문서를 트리 구조로 표현. DOM 조작은 렌더링 엔진을 통해 화면을 업데이트하므로 비쌉니다.<br><br><b>Virtual DOM</b>: 메모리의 경량 DOM 복사본. 상태 변경 시 새 VDOM을 생성하고 이전과 비교(diffing)해 최소 DOM 변경만 수행합니다.<br><br><b>재조정(Reconciliation)</b>: key prop을 이용해 변경된 부분만 실제 DOM에 반영.`,
  whyImportant:'React를 쓰는 근본적 이유이며 key prop 사용 이유, 리렌더링 최적화의 기반입니다.',
  questions:[{q:'Virtual DOM이 왜 성능상 이점이 있나요?',points:['직접 DOM 조작의 비용(reflow/repaint) 설명','VDOM diffing으로 최소 변경 계산','batching으로 여러 변경을 한 번에 처리','key prop의 역할']}],
  warn:'Virtual DOM이 항상 빠른 건 아닙니다. VDOM 생성과 diffing에도 비용이 있어, 단순한 DOM 조작은 직접 DOM API가 더 빠를 수 있습니다.',
  react:'React 18 Concurrent Mode는 VDOM 업데이트를 중단/재개할 수 있어 UI가 차단되지 않습니다.',
  expert:'면접관 포인트: "key prop을 index로 쓰면 왜 문제가 생기나요?" — 순서 변경 시 key도 바뀌어 불필요한 unmount/mount 발생.',
  code:`<span class='cm'>// ❌ index를 key로 사용</span>
items.map((item, i) => &lt;li key={i}&gt;...&lt;/li&gt;)

<span class='cm'>// ✅ 고유 id를 key로 사용</span>

  {id:'browser-rendering',title:'브라우저 렌더링 과정',cat:'browser',catLabel:'브라우저',tag:'tag-browser',tagText:'렌더링 파이프라인',
  summary:'HTML→DOM, CSS→CSSOM, Render Tree, Layout, Paint, Composite. JS는 이 과정을 차단할 수 있다.',
  explain:`브라우저 렌더링 파이프라인:<br>1. <b>파싱</b>: HTML→DOM, CSS→CSSOM 트리 생성<br>2. <b>Render Tree</b>: DOM+CSSOM 결합<br>3. <b>Layout(Reflow)</b>: 위치·크기 계산<br>4. <b>Paint</b>: 픽셀로 그리기<br>5. <b>Composite</b>: 레이어 합성<br><br>비용: Reflow > Repaint > Composite(GPU)`,
  whyImportant:'성능 최적화의 근거. CSS 애니메이션에 transform을 쓰는 이유, JS가 렌더링을 막는 이유가 여기서 설명됩니다.',
  questions:[{q:'Reflow와 Repaint의 차이와 최소화 방법은?',points:['Reflow > Repaint > Composite 비용 순서','transform/opacity가 빠른 이유 (GPU 레이어)','async/defer 스크립트 로드','requestAnimationFrame 활용']}],
  warn:'JS는 HTML 파싱을 차단합니다. <script>를 body 마지막에 넣거나 async/defer를 사용해야 합니다.',
  react:'React 배칭(batching)은 여러 setState를 모아 한 번의 리렌더링으로 처리합니다. React 18에서는 setTimeout 등에서도 자동 배칭됩니다.',
  expert:'면접관 포인트: "requestAnimationFrame을 언제 쓰나요?" — 매 프레임 실행 애니메이션. 60fps에서 약 16ms마다 실행됩니다.',
  code:`<span class='cm'>// Reflow 유발 — 피해야 할 패턴</span>
el.style.width = <span class='str'>"100px"</span>;   <span class='cm'>// Reflow</span>
el.style.height = <span class='str'>"100px"</span>;  <span class='cm'>// Reflow (2번!)</span>

<span class='cm'>// 최적화: 한 번에</span>
el.style.cssText = <span class='str'>"width:100px;height:100px"</span>;
el.classList.add(<span class='str'>"expanded"</span>); <span class='cm'>// 더 좋음</span>

<span class='cm'>// GPU 가속 (Composite만 발생)</span>
<span class='cm'>// .box { transition: transform 0.3s }</span>`},

  summary:'CSR은 클라이언트 렌더링, SSR은 서버 렌더링, SSG는 빌드 타임 렌더링. 각각 장단점과 적합한 상황이 다르다.',
  explain:`<b>CSR</b>: 서버는 빈 HTML+JS를 전송, 브라우저가 UI 생성. 초기 로드 느림, 이후 빠름.<br><b>SSR</b>: 각 요청마다 서버가 완성 HTML 생성. SEO에 유리. 서버 비용 높음.<br><b>SSG</b>: 빌드 타임에 HTML 미리 생성. CDN 서빙으로 매우 빠름. 콘텐츠 변경 시 재빌드 필요.<br><b>ISR</b>: SSG + 일정 시간 후 재생성. Next.js 고유 기능.`,
  whyImportant:'Next.js 개발자 필수 지식. 어떤 페이지를 어떤 방식으로 렌더링할지 결정하는 아키텍처 판단력입니다.',
  questions:[{q:'어떤 상황에서 CSR, SSR, SSG를 각각 선택하나요?',points:['SEO 필요 여부로 구분','데이터 변경 빈도로 SSR vs SSG 구분','TTFB, FCP, TTI 지표와 연결','Next.js App Router Server Component 설명']}],
  warn:'Hydration 문제: SSR 렌더 HTML과 클라이언트 JS가 만드는 DOM이 다르면 hydration mismatch 에러 발생.',
  react:'Next.js App Router의 Server Component는 기본이 서버 실행. "use client" 없으면 서버 컴포넌트 — 클라이언트 번들에 포함되지 않습니다.',
  expert:'면접관 포인트: "React의 hydration이란?" — 서버에서 렌더된 HTML에 이벤트 핸들러 등 JS 기능을 붙이는 과정입니다.',
  code:`<span class='cm'>// Next.js App Router</span>
<span class='cm'>// Server Component (기본)</span>
<span class='kw'>async function</span> <span class='fn'>Page</span>({ params }) {
  <span class='kw'>const</span> data = <span class='kw'>await</span> db.findById(params.id);
  <span class='kw'>return</span> &lt;Detail data={data} /&gt;;
}

<span class='cm'>// ISR: 60초마다 재생성</span>
<span class='kw'>await</span> fetch(url, { next: { revalidate: <span class='num'>60</span> } });`},

  {id:'esmodule-commonjs',title:'ESModule vs CommonJS',cat:'es6',catLabel:'ES6+',tag:'tag-es6',tagText:'모듈 시스템',
  summary:'CommonJS는 require/module.exports, ESModule은 import/export. 정적 분석 가능 여부가 핵심 차이.',
  explain:`<b>CommonJS(CJS)</b>: Node.js의 기본. require()는 런타임에 동적으로 실행. 동기적.<br><br><b>ES Modules(ESM)</b>: ECMAScript 표준. import/export는 정적 구조라 번들러가 분석 가능.<br><br><b>Tree Shaking</b>: ESM의 정적 구조 덕분에 번들러가 사용하지 않는 코드를 제거할 수 있습니다.<br><br><b>Top-level await</b>: ESM에서만 가능.`,
  whyImportant:'번들러, tree-shaking, Next.js 설정, 라이브러리 compatibility 이슈 등에서 반드시 알아야 합니다.',
  questions:[{q:'Tree Shaking이 ESM에서만 잘 되는 이유는?',points:['정적 분석 가능 vs 런타임 동적 분석 차이','CJS는 조건부 require가 가능해 정적 분석 불가','ESM import는 반드시 최상단에 위치','named export vs default export']}],
  warn:'CJS와 ESM 혼용 시 "Cannot use import statement" 등의 에러 발생. package.json의 "type" 필드와 확장자(.cjs, .mjs)를 확인하세요.',
  react:'Next.js는 ESM 기반. "use client", "use server" 지시어도 ESM에서 동작합니다.',
  expert:'면접관 포인트: "named export vs default export 중 어떤 것이 tree shaking에 유리한가요?" — named export가 더 유리. 번들러가 어떤 것을 import했는지 정확히 알 수 있기 때문입니다.',
  code:`<span class='cm'>// CommonJS</span>
<span class='kw'>const</span> _ = require(<span class='str'>"lodash"</span>); <span class='cm'>// 전체 로드</span>
module.exports = { add };

<span class='cm'>// ES Modules — tree shaking 가능</span>
<span class='kw'>import</span> { debounce } <span class='kw'>from</span> <span class='str'>"lodash-es"</span>;
<span class='kw'>export const</span> add = (a,b) => a+b;

<span class='cm'>// Top-level await (ESM only)</span>
<span class='kw'>const</span> config = <span class='kw'>await</span> fetch(<span class='str'>"/config.json"</span>)

];

const categories=[
  {id:'core',label:'핵심 JS',color:'#534AB7'},
  {id:'async',label:'비동기',color:'#0F6E56'},
  {id:'oop',label:'객체 지향',color:'#993C1D'},
  {id:'es6',label:'ES6+',color:'#185FA5'},
  {id:'browser',label:'브라우저',color:'#854F0B'},
  {id:'perf',label:'성능',color:'#3B6D11'},
];
const catColors={core:'#534AB7',async:'#0F6E56',oop:'#993C1D',es6:'#185FA5',browser:'#854F0B',perf:'#3B6D11'};

let currentIndex=0;
const visited=new Set();
let drawerOpen=false;

function toggleDrawer(){drawerOpen?closeDrawer():openDrawer();}
function openDrawer(){
  drawerOpen=true;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
}
function closeDrawer(){
  drawerOpen=false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
}

function buildNav(){
  const nav=document.getElementById('nav-list');
  nav.innerHTML='';
  const grouped={};
  topics.forEach(t=>{if(!grouped[t.cat])grouped[t.cat]=[];grouped[t.cat].push(t);});
  categories.forEach(cat=>{
    if(!grouped[cat.id])return;
    const lb=document.createElement('div');
    lb.className='cat-label';lb.textContent=cat.label;nav.appendChild(lb);
    grouped[cat.id].forEach(t=>{
      const item=document.createElement('div');
      item.className='nav-item';item.id='nav-'+t.id;
      item.setAttribute('role','button');
      item.setAttribute('tabindex','0');
      item.innerHTML=`<span class="nav-dot" style="background:${catColors[t.cat]}20;border:1.5px solid ${catColors[t.cat]}"></span>${t.title}`;
      item.onclick=()=>{showTopic(topics.findIndex(x=>x.id===t.id));closeDrawer();};
      item.onkeydown=(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();item.click();}};
      nav.appendChild(item);
    });
  });
}

function updateProgress(){
  const pct=Math.round((visited.size/topics.length)*100);
  document.getElementById('prog').style.width=pct+'%';
  document.getElementById('prog-chip').textContent=visited.size+' / '+topics.length;
}

function showTopic(idx){
  currentIndex=idx;
  const t=topics[idx];
  visited.add(t.id);
  document.querySelectorAll('.nav-item').forEach(el=>{el.classList.remove('active');el.removeAttribute('aria-current');});
  const navEl=document.getElementById('nav-'+t.id);
  if(navEl){navEl.classList.add('active');navEl.setAttribute('aria-current','page');navEl.scrollIntoView({block:'nearest'});}
  document.getElementById('topbar-title').textContent=t.title;

  const container=document.getElementById('topic-container');
  container.innerHTML=`
    <div class="topic-tag ${t.tag}">${t.tagText} · ${t.catLabel}</div>
    <div class="topic-title">${t.title}</div>
    <div class="topic-summary">${t.summary}</div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-info-circle" aria-hidden="true"></i>자세한 설명</div>
      <div class="sec-body">${t.explain}</div>
    </div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-bulb" aria-hidden="true"></i>왜 중요한가</div>
      <div class="sec-body">${t.whyImportant}</div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-message-circle" aria-hidden="true"></i>면접 질문 예시</div>
      ${t.questions.map(q=>`
        <div class="iq">
          <div class="ql">Q. 면접관 질문</div>
          <div class="qt">${q.q}</div>
          <div class="ap" style="border-top:0.5px solid var(--c-border);padding-top:7px;margin-top:7px">
            <div style="font-size:11px;font-weight:500;color:var(--c-t3);margin-bottom:5px">좋은 답변 포인트</div>
            ${q.points.map(p=>`<div class="ap-row">${p}</div>`).join('')}
          </div>
        </div>`).join('')}
    </div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i>헷갈리기 쉬운 부분</div>
      <div class="warn-box">${t.warn}</div>
    </div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-atom" aria-hidden="true"></i>React / Next.js 연결</div>
      <div class="react-box"><i class="ti ti-brand-react" aria-hidden="true"></i><span>${t.react}</span></div>
    </div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-eye" aria-hidden="true"></i>면접관이 보는 포인트</div>
      <div class="expert-box"><i class="ti ti-user-check" aria-hidden="true"></i><span>${t.expert}</span></div>
    </div>

    <div class="section">
      <div class="sec-title"><i class="ti ti-code" aria-hidden="true"></i>코드 예시</div>
      <pre>${t.code}</pre>
    </div>

    <div class="nav-controls">
      <button class="nav-btn" ${idx===0?'disabled':''} onclick="showTopic(${idx-1})">
        <i class="ti ti-arrow-left" aria-hidden="true"></i>이전
      </button>
      <button class="nav-btn" onclick="sendPrompt('JavaScript 면접 꼬리질문 모음을 정리해줘. 위에서 다룬 26개 주제에서 면접관이 이어가는 심화 꼬리질문들이야.')">
        꼬리질문 ↗
      </button>
      <button class="nav-btn" ${idx===topics.length-1?'disabled':''} onclick="showTopic(${idx+1})">
        다음<i class="ti ti-arrow-right" aria-hidden="true"></i>
      </button>
    </div>`;

  updateProgress();
  document.getElementById('main-content').scrollTop=0;
  document.getElementById('app').scrollTop=0;
}

buildNav();
showTopic(0);

/* ── Swipe gesture to open/close drawer (mobile) ── */
(function(){
  let startX=0,startY=0,isDragging=false;
  const EDGE=30, THRESHOLD=60;
  document.addEventListener('touchstart',e=>{
    const t=e.touches[0];
    startX=t.clientX; startY=t.clientY; isDragging=true;
  },{passive:true});
  document.addEventListener('touchend',e=>{
    if(!isDragging)return; isDragging=false;
    const t=e.changedTouches[0];
    const dx=t.clientX-startX, dy=t.clientY-startY;
    if(Math.abs(dy)>Math.abs(dx)*1.5)return;
    if(!drawerOpen && startX<EDGE && dx>THRESHOLD){openDrawer();}
    else if(drawerOpen && dx<-THRESHOLD){closeDrawer();}
  },{passive:true});
})();

/* ── Keyboard nav ── */
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='ArrowRight'&&currentIndex<topics.length-1)showTopic(currentIndex+1);
  else if(e.key==='ArrowLeft'&&currentIndex>0)showTopic(currentIndex-1);
  else if(e.key==='Escape'&&drawerOpen)closeDrawer();
});
</script>
