    code: `<span class='cm'>// Debounce 구현</span>

  <span class='kw'>let</span> timerId; <span class='cm'>// 클로저로 유지</span>
  <span class='kw'>return function</span>(...args) {
    clearTimeout(timerId); <span class='cm'>// 이전 타이머 취소</span>
    timerId = setTimeout(() => fn.apply(<span class='kw'>this</span>, args), delay);
  };
}

<span class='cm'>// Throttle 구현</span>
<span class='kw'>function</span> <span class='fn'>throttle</span>(fn, delay) {
  <span class='kw'>let</span> lastCall = <span class='num'>0</span>; <span class='cm'>// 클로저로 유지</span>
  <span class='kw'>return function</span>(...args) {

    <span class='kw'>if</span> (now - lastCall >= delay) {
      lastCall = now;
      fn.apply(<span class='kw'>this</span>, args);
    }
  };
}

);

const categories = [
  { id: 'core', label: '핵심 JS', color: '#534AB7' },
  { id: 'async', label: '비동기', color: '#0F6E56' },
  { id: 'oop', label: '객체 지향', color: '#993C1D' },
  { id: 'es6', label: 'ES6+', color: '#185FA5' },
  { id: 'browser', label: '브라우저', color: '#854F0B' },
  { id: 'perf', label: '성능', color: '#3B6D11' },
];

const catColors = {
  core: '#534AB7', async: '#0F6E56', oop: '#993C1D',
  es6: '#185FA5', browser: '#854F0B', perf: '#3B6D11'
};
const catBg = {
  core: '#EEEDFE', async: '#E1F5EE', oop: '#FAECE7',
  es6: '#E6F1FB', browser: '#FAEEDA', perf: '#EAF3DE'
};

let currentIndex = 0;
const visited = new Set();

function buildNav() {
  const nav = document.getElementById('nav-list');
  const grouped = {};
  topics.forEach(t => {
    if (!grouped[t.cat]) grouped[t.cat] = [];
    grouped[t.cat].push(t);
  });
  categories.forEach(cat => {
    if (!grouped[cat.id]) return;
    const label = document.createElement('div');
    label.className = 'cat-label';
    label.textContent = cat.label;
    nav.appendChild(label);
    grouped[cat.id].forEach((t, li) => {
      const item = document.createElement('div');
      item.className = 'nav-item';
      item.id = 'nav-' + t.id;
      item.innerHTML = `<span class="nav-dot" style="background:${catColors[t.cat]}20;border:1.5px solid ${catColors[t.cat]}"></span>${t.title}`;
      item.onclick = () => {
        const idx = topics.findIndex(x => x.id === t.id);
        showTopic(idx);
      };
      nav.appendChild(item);
    });
  });
}

function updateProgress() {
  const pct = Math.round((visited.size / topics.length) * 100);
  document.getElementById('prog').style.width = pct + '%';
  document.getElementById('prog-text').textContent = visited.size + ' / ' + topics.length;
}

function showTopic(idx) {
  currentIndex = idx;
  const t = topics[idx];
  visited.add(t.id);

  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const navEl = document.getElementById('nav-' + t.id);
  if (navEl) { navEl.classList.add('active'); navEl.scrollIntoView({ block: 'nearest' }); }

  const container = document.getElementById('topic-container');
  container.innerHTML = '';

  const card = document.createElement('div');
  card.className = 'topic-card visible';
  card.innerHTML = `
    <div class="topic-header">
      <div class="topic-tag ${t.tag}">${t.tagText} · ${t.catLabel}</div>
      <div class="topic-title">${t.title}</div>
      <div class="topic-summary">${t.summary}</div>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-info-circle" aria-hidden="true"></i>자세한 설명</div>
      <div class="section-body">${t.explain}</div>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-bulb" aria-hidden="true"></i>왜 중요한가</div>
      <div class="section-body">${t.whyImportant}</div>
    </div>

    <div class="divider"></div>

    <div class="section">
      <div class="section-title"><i class="ti ti-message-circle" aria-hidden="true"></i>실제 면접 질문 예시</div>
      ${t.questions.map(q => `
        <div class="interview-q">
          <div class="q-label">Q. 면접관 질문</div>
          <div class="q-text">${q.q}</div>
          <div class="a-points">
            <div style="font-size:11px;font-weight:500;color:var(--color-text-tertiary);margin-bottom:6px;">좋은 답변 포인트</div>
            ${q.points.map(p => `<div class="a-point">${p}</div>`).join('')}
          </div>
        </div>
      `).join('')}
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-alert-triangle" aria-hidden="true"></i>헷갈리기 쉬운 부분</div>
      <div class="warn-box">${t.warn}</div>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-atom" aria-hidden="true"></i>React / Next.js 연결 포인트</div>
      <div class="react-box"><i class="ti ti-brand-react" aria-hidden="true"></i><span>${t.react}</span></div>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-eye" aria-hidden="true"></i>면접관이 보는 포인트</div>
      <div class="expert-box"><i class="ti ti-user-check" aria-hidden="true"></i><span>${t.expert}</span></div>
    </div>

    <div class="section">
      <div class="section-title"><i class="ti ti-code" aria-hidden="true"></i>코드 예시</div>
      <pre>${t.code}</pre>
    </div>

    <div class="nav-controls">
      <button class="nav-btn" id="btn-prev" ${idx === 0 ? 'disabled' : ''} onclick="showTopic(${idx - 1})">
        <i class="ti ti-arrow-left" aria-hidden="true"></i> 이전
      </button>
      <button class="nav-btn" id="btn-tail" onclick="showTailQuestions()">
        <i class="ti ti-list" aria-hidden="true"></i> 꼬리질문 모음 ↗
      </button>
      <button class="nav-btn" id="btn-next" ${idx === topics.length - 1 ? 'disabled' : ''} onclick="showTopic(${idx + 1})">
        다음 <i class="ti ti-arrow-right" aria-hidden="true"></i>
      </button>
    </div>
  `;
  container.appendChild(card);
  updateProgress();
  document.getElementById('main-content').scrollTop = 0;
}

function showTailQuestions() {
  sendPrompt('JavaScript 면접에서 자주 나오는 꼬리질문들을 정리해줘. 위에서 다룬 26개 주제에서 이어지는 심화 꼬리질문들이야. 면접관이 "그렇다면..."으로 이어가는 패턴으로 주제별로 정리해줘.');
}

buildNav();
showTopic(0);
</script>
